<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KI-Use-Case-Navigator — nozilla</title>

  <!-- nozilla Fonts: Zilla Slab · Inter · Space Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@700&family=Inter:wght@400;600&family=Space+Mono:ital,wght@0,400;0,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="top-bar">
    <header class="app-header">
      <div class="header-inner">
        <h1 class="app-title">KI-Use-Case-<mark class="g">Navigator</mark></h1>
        <p id="app-subtitle" class="app-subtitle"></p>
      </div>
    </header>
    <div class="progress-wrapper">
      <nav id="progress-bar" class="progress-bar" aria-label="Fortschritt"></nav>
    </div>
  </div>

  <main id="module-container" class="module-container" role="main"></main>

  <footer class="site-footer">
    <nav class="site-footer-links">
      <a href="https://nozilla.de/impressum">Impressum</a>
      <a href="https://nozilla.de/datenschutz">Datenschutz</a>
      <a href="https://nozilla.de/kontakt">Kontakt</a>
    </nav>
    <a class="site-footer-brand" href="https://nozilla.de">nozilla | bits &amp; bytes mit ❤</a>
  </footer>

  <div class="nav-footer">
    <div class="nav-inner">
      <button id="btn-back" type="button" class="btn btn-secondary">← Zurück</button>
      <button id="btn-skip" type="button" class="btn btn-ghost">Überspringen</button>
      <button id="btn-next" type="button" class="btn btn-primary">Weiter →</button>
    </div>
  </div>

  <div id="resume-dialog" class="dialog-overlay hidden"
       role="dialog" aria-modal="true" aria-labelledby="dialog-title">
    <div class="dialog-box">
      <h2 id="dialog-title">Fortschritt fortsetzen?</h2>
      <p id="dialog-info">Es wurden gespeicherte Eingaben gefunden.</p>
      <div class="dialog-actions">
        <button id="btn-resume-yes" type="button" class="btn btn-primary">Fortsetzen</button>
        <button id="btn-resume-no"  type="button" class="btn btn-secondary">Neu beginnen</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="content.js"></script>
  <script src="wizard.js"></script>
</body>
</html>
