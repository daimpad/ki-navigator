<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KI-Use-Case-Navigator — nozilla</title>

  <!-- nozilla Fonts: Zilla Slab · Inter · Space Mono (lokal) -->
  <link rel="stylesheet" href="fonts/fonts.css">
  <!-- Font Awesome (lokal) -->
  <link rel="stylesheet" href="fonts/fa-all.min.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="top-bar">
    <header class="app-header">
      <div class="header-inner">
        <h1 class="app-title">KI-Use-Case-<mark class="g">Navigator</mark></h1>
        <p id="app-subtitle" class="app-subtitle"></p>
      </div>
    </header>
    <div class="progress-wrapper">
      <nav id="progress-bar" class="progress-bar" aria-label="Fortschritt"></nav>
    </div>
  </div>

  <main id="module-container" class="module-container" role="main"></main>

  <div class="nav-footer">
    <div class="nav-inner">
      <button id="btn-back" type="button" class="btn btn-secondary"><i class="fa-solid fa-arrow-left"></i> Zurück</button>
      <nav class="site-footer-links">
        <a href="https://nozilla.de/impressum">Impressum</a>
        <a href="https://nozilla.de/datenschutz">Datenschutz</a>
        <a href="https://nozilla.de/kontakt">Kontakt</a>
        <a href="https://nozilla.de">nozilla | bits &amp; bytes mit ❤</a>
      </nav>
      <button id="btn-skip" type="button" class="btn btn-ghost">Überspringen</button>
      <button id="btn-next" type="button" class="btn btn-primary">Weiter <i class="fa-solid fa-arrow-right"></i></button>
    </div>
  </div>

  <div id="resume-dialog" class="dialog-overlay hidden"
       role="dialog" aria-modal="true" aria-labelledby="dialog-title">
    <div class="dialog-box">
      <h2 id="dialog-title">Fortschritt fortsetzen?</h2>
      <p id="dialog-info">Es wurden gespeicherte Eingaben gefunden.</p>
      <div class="dialog-actions">
        <button id="btn-resume-yes" type="button" class="btn btn-primary">Fortsetzen</button>
        <button id="btn-resume-no"  type="button" class="btn btn-secondary">Neu beginnen</button>
      </div>
    </div>
  </div>

  <!-- jsPDF 2.5.1 (lokal) -->
  <script src="vendor/jspdf.umd.min.js"></script>
  <!-- Kuratierte Adressierungs-Hinweise (redaktionell pflegbar, kein Build) -->
  <script src="stakeholder-hints.js"></script>
  <script src="content.js"></script>
  <script src="wizard.js"></script>
</body>
</html>
